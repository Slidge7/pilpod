<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PilPod</title>
  <link rel="stylesheet" href="standalone.css" />
</head>
<body>
  <header class="header">
    <div class="brand">
      <img src="../../icons/icon48.png" alt="" class="logo" width="20" height="20" />
      <span class="title">PilPod</span>
    </div>
    <div class="header-right">
      <button id="btnRefresh" class="icon-btn" title="Refresh">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
    </div>
  </header>

  <!-- Search bar -->
  <div class="search-wrap">
    <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="searchInput" type="search" placeholder="Search tabs… (press Enter to jump)" autocomplete="off" spellcheck="false" />
    <kbd class="shortcut-hint">⌘K</kbd>
  </div>

  <!-- Tab views -->
  <div class="tabs-nav">
    <button class="tab-btn active" data-view="audio">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
      Audio
      <span id="audioCount" class="badge">0</span>
    </button>
    <button class="tab-btn" data-view="all">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      All Tabs
      <span id="allCount" class="badge">0</span>
    </button>
  </div>

  <!-- Tab list -->
  <div id="tabList" class="tab-list"></div>

  <!-- Empty state -->
  <div id="emptyState" class="empty-state hidden">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
    <p id="emptyMsg">No audio tabs right now</p>
  </div>

  <!-- Error -->
  <p id="errorMsg" class="error hidden" role="alert"></p>

  <!-- Volume panel (slides up) -->
  <div id="volumePanel" class="volume-panel hidden">
    <div class="volume-panel-header">
      <span id="volumePanelTitle" class="volume-panel-label">Volume</span>
      <button id="volumePanelClose" class="icon-btn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="volume-slider-wrap">
      <span class="vol-label">0%</span>
      <input id="volumeSlider" type="range" min="0" max="6" step="0.05" value="1" />
      <span id="volDisplay" class="vol-label vol-val">100%</span>
    </div>
    <div class="volume-presets">
      <button class="preset-btn" data-vol="0.5">50%</button>
      <button class="preset-btn" data-vol="1">100%</button>
      <button class="preset-btn" data-vol="1.5">150%</button>
      <button class="preset-btn" data-vol="2">200%</button>
      <button class="preset-btn" data-vol="3">300%</button>
      <button class="preset-btn" data-vol="6">600%</button>
    </div>
  </div>

  <script type="module" src="standalone.js"></script>
</body>
</html>
